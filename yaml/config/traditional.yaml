# Pipeline selection
pipeline:
  pipeline: "traditional"  # "deep_learning" or "traditional"

# Data parameters
data:
  # "HR-mix1", "HR-single", "LR-mix2", "LR-single", "HR-all", "LR-all", "test"
  data_type: "LR-all"
  # windows: "E:/AFCI/Datasets/"
  # linux: "/home/xiaoman/Projects/Datasets/"
  data_path: "/home/xiaoman/Projects/Datasets/"

# Model parameters (kept for compatibility with unified main.py)
model:
  model: "ADINet"
  window_size: null

# Traditional ML parameters
traditional:
  n_runs: 5

# Training parameters (kept for compatibility with unified main.py)
training:
  epochs: 50
  batch_size: 128
  lr: 1.0e-4
  optimizer: "Adam"
  momentum: 0.9

# Test parameters (for deep-learning `test.py`; traditional pipeline可忽略)
test:
  n_runs: 5
  checkpoint_mode: "last"
  checkpoint_path: null
  model_save_format: "full_model"

# System parameters
system:
  device: "cuda"
  log_interval: 1
  save_interval: 1
  save_path: "/home/xiaoman/Projects/AFCI/checkpoints"
