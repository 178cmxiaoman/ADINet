# Data parameters
# "HR-mix1", "HR-single", "LR-mix2", "LR-single", "HR-all", "LR-all", "test"
data:
  data_type: "HR-mix1"
  data_path: "/home/xiaoman/Projects/Datasets/"

# Model parameters
model:
  model: "CNNTransformerParallel"
  window_size: null
  num_classes: 2

# CNN-Transformer parameters
cnn_transformer:
  cnn_channels: [64, 256]
  d_model: 192
  n_head: 4
  n_layers: 4
  dim_feedforward: 384
  dropout: 0.1

# Training parameters
training:
  epochs: 50
  batch_size: 128
  lr: 1.0e-4
  optimizer: "Adam"
  momentum: 0.9

# Test parameters
test:
  n_runs: 5
  checkpoint_mode: "both"
  checkpoint_path: null
  model_save_format: "full_model"

# System parameters
system:
  device: "cuda"
  log_interval: 1
  save_interval: 10
  save_path: "/home/xiaoman/Projects/AFCI/checkpoints/master/CNNTransformerParallel/HR-mix1"
