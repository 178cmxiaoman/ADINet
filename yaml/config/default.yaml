# Data parameters
data:
  data_type: "HR-mix1"
  # windows: "E:/AFCI/Datasets/"
  # linux: "/home/xiaoman/Projects/Datasets/"
  data_path: "/home/xiaoman/Projects/Datasets/"

# Model parameters
model:
  model: "GRU"
  window_size: null

# Training parameters
training:
  epochs: 50
  batch_size: 128
  lr: 1.0e-4
  optimizer: "Adam"
  momentum: 0.9

# Test parameters
test:
  n_runs: 5
  checkpoint_mode: "last"       # "last" | "best" | "both"
  checkpoint_path: null          # 为 null 时按 checkpoint_mode 自动从 save_path 解析
  model_save_format: "full_model"  # "full_model" | "state_dict"

# System parameters
system:
  device: "cuda"
  log_interval: 1
  save_interval: 1
  # windows: "E:/AFCI/checkpoints"
  # linux: "/home/zzy/Datasets/checkpoints"
  save_path: "/home/xiaoman/Projects/AFCI/checkpoints"