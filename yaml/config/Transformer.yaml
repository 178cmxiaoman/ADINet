# Data parameters
# "HR-mix1", "HR-single", "LR-mix2", "LR-single", "HR-all", "LR-all", "test"
data:
  data_type: "HR-mix1"
  # windows: "E:/AFCI/Datasets/"
  # linux: "/home/xiaoman/Projects/Datasets/"
  data_path: "/root/Projects/Datasets/"

# Model parameters
model:
  model: "Transformer"
  window_size: null

# Training parameters
training:
  epochs: 100
  batch_size: 256
  # lr: 5.0e-4
  lr: 1.0e-4
  optimizer: "Adam"
  momentum: 0.9

# Transformer-specific options
transformer:
  d_model: 64
  nhead: 4
  num_layers: 2
  dim_feedforward: 128
  dropout: 0.1

# Test parameters
test:
  n_runs: 20
  checkpoint_mode: "both"         # ADINet 常用同时测试 best/last
  checkpoint_path: null
  model_save_format: "state_dict" # ADINet 分支保存为 state_dict

# System parameters
system:
  device: "cuda"
  log_interval: 1
  save_interval: 20
  # windows: "E:/AFCI/checkpoints"
  # linux: "/home/xiaoman/Projects/AFCI/checkpoints"
  save_path: "/root/Projects/AFCI/checkpoints"
  # save_path: "/dev/AFCI/checkponits"
