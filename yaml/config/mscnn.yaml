# Data parameters
data:
  # "HR-mix1", "HR-single", "LR-mix2", "LR-single", "HR-all", "LR-all", "test"
  data_type: "LR-single"
  # windows: "E:/AFCI/Datasets/"
  # linux: "/home/xiaoman/Projects/Datasets/"
  data_path: "/home/xiaoman/Projects/Datasets/"

# Model parameters
model:
  model: "MSCNN"
  window_size: null

# Training parameters
training:
  epochs: 400
  batch_size: 256
  lr: 5.0e-4
  optimizer: "Adam"
  momentum: 0.9
  weight_decay: 1.0e-5

# Optional scheduler / early-stopping params (for MSCNN experiments)
# Note: current main.py may not consume all fields below yet.
mscnn_training:
  use_scheduler: true
  scheduler_factor: 0.5
  scheduler_patience: 30
  scheduler_min_lr: 1.0e-6
  early_stopping_patience: 200

# Test parameters
test:
  n_runs: 5
  checkpoint_mode: "last"
  checkpoint_path: null
  model_save_format: "full_model"

# System parameters
system:
  device: "cuda"
  log_interval: 1
  save_interval: 1
  # windows: "E:/AFCI/checkpoints"
  # linux: "/home/xiaoman/Projects/AFCI/checkpoints"
  save_path: "/home/xiaoman/Projects/AFCI/checkpoints"
